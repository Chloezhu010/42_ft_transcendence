services:
  nginx:
    build: ./nginx
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      - frontend
      - backend
      - grafana

  backend:
    build: ./backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - backend_images:/app/images
      - backend_backups:/app/backups
    environment:
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-https://localhost:8443}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DB_PATH=${DB_PATH:-wondercomic.db}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - ADMIN_PROMOTION_SECRET=${ADMIN_PROMOTION_SECRET:-}
      - RESTORE_BACKUP_SECRET=${RESTORE_BACKUP_SECRET:-}
      - SESSION_SECRET_KEY=${SESSION_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-https://localhost:8443/api/auth/oauth/google/callback}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}

  backup-worker:
    build: ./backend
    command: ["python", "backup_worker.py"]
    volumes:
      - ./backend:/app
      - backend_images:/app/images
      - backend_backups:/app/backups
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=${DB_PATH:-wondercomic.db}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=
    depends_on:
      - backend

  node_exporter:
    image: docker.io/prom/node-exporter:v1.9.1
    # container_name: node_exporter
    expose:
      - "9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  alertmanager:
    image: docker.io/prom/alertmanager:v0.27.0
    # container_name: alertmanager
    expose:
      - "9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  prometheus:
    image: docker.io/prom/prometheus:v3.5.1
    container_name: prometheus
    expose:
      - "9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.rules.yml:/etc/prometheus/alerts.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=1GB"
    depends_on:
      - backend
      - node_exporter
      - alertmanager

  grafana:
    image: docker.io/grafana/grafana:11.6.1
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://localhost:8443/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_BASIC_ENABLED=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/grafana/provisioning:/etc/grafana/provisioning
      - ./backend/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
    depends_on:
      - prometheus

volumes:
  backend_images:
  backend_backups:
  alertmanager_data:
  prometheus_data:
  grafana_data:
