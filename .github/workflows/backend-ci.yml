name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --extra test

      - name: Run Ruff lint
        run: uv tool run ruff check .

      - name: Run Ruff format check
        run: uv tool run ruff format --check .

      - name: Run pytest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci-dummy-gemini-key' }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'ci-dummy-jwt-secret-key-32chars-xx' }}
          SESSION_SECRET_KEY: ci-dummy-session-secret-key-32chars
          GOOGLE_CLIENT_ID: ci-dummy-google-client-id
          GOOGLE_CLIENT_SECRET: ci-dummy-google-client-secret
        run: uv run pytest
