global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: wondercomic-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]
